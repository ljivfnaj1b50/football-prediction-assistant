<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鲸喜足球风控模型</title>
  <link rel="stylesheet" href="./styles.css?v=phase2" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="brand-block">
        <div class="eyebrow">JINGXI FOOTBALL RISK MODEL</div>
        <h1>鲸喜足球风控模型</h1>
        <p>自动抓取赛程、球队状态、盘口水位、天气环境、伤停停赛、赛程疲劳与公开新闻信号，输出概率、风险、冷热和模型依据。</p>
      </div>
      <div class="hero-actions">
        <button id="refreshBtn">自动刷新数据</button>
        <button id="demoBtn" class="ghost">无接口演示</button>
        <button class="ghost" onclick="location.href='./admin-home.html?console1'">内部控制台</button>
      </div>
    </header>

    <main>
      <section class="status-grid" id="sourceStatus"></section>

      <section class="toolbar panel">
        <div>
          <h2>自动赛事池</h2>
          <p id="lastUpdated">等待同步数据...</p>
        </div>
        <div class="filters">
          <select id="riskFilter" aria-label="风险筛选">
            <option value="all">全部风险</option>
            <option value="low">只看低风险</option>
            <option value="medium">只看中风险</option>
            <option value="high">只看高风险</option>
            <option value="avoid">只看避开</option>
          </select>
          <select id="sortBy" aria-label="排序">
            <option value="confidence">按模型信心</option>
            <option value="edge">按市场偏差</option>
            <option value="kickoff">按开球时间</option>
            <option value="risk">按风险等级</option>
          </select>
        </div>
      </section>

      <section class="grid-layout">
        <aside class="panel match-list-panel">
          <h2>比赛列表</h2>
          <div id="matchList" class="match-list"></div>
        </aside>

        <section class="panel detail-panel">
          <div id="matchDetail" class="empty-state">
            <h2>正在准备模型...</h2>
            <p>点击“自动刷新数据”。没有接口 Key 时，会启用演示数据，但模型逻辑是真实结构，不再是手工打分。</p>
          </div>
        </section>
      </section>

      <section class="panel model-note">
        <h2>风控原则</h2>
        <p>模型只使用公开数据和已接入接口数据。更衣室关系、教练私人关系、球员私人关系这类内容，只能通过公开新闻、发布会、可信记者报道做低权重舆情信号；不能伪造成确定事实。</p>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js?v=phase2"></script>
</body>
</html>
