<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鲸喜足球 · 表单维护后台</title>
  <link rel="stylesheet" href="./styles.css?v=form2" />
  <style>
    .form-layout { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 18px; margin-top: 18px; align-items: start; }
    .form-side { display: grid; gap: 14px; }
    .form-card { background: rgba(3,16,24,.52); border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .match-item { width: 100%; text-align: left; display: block; margin-bottom: 10px; padding: 12px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); box-shadow: none; }
    .match-item.active { border-color: rgba(49,230,161,.55); background: rgba(49,230,161,.09); }
    .match-item strong { display:block; margin-bottom: 4px; }
    .match-item span { color: var(--muted); font-size: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .form-section { background: rgba(3,16,24,.52); border: 1px solid var(--line); border-radius: 18px; padding: 16px; }
    .form-section.full { grid-column: 1 / -1; }
    label { display: grid; gap: 8px; color: var(--muted); font-weight: 800; margin-bottom: 12px; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); background: rgba(3,16,24,.88); color: var(--text); border-radius: 12px; padding: 11px 12px; outline: none; }
    textarea { min-height: 104px; resize: vertical; line-height: 1.55; }
    .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .actions { display:flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .status { white-space: pre-wrap; line-height: 1.65; color: var(--muted); max-height: 260px; overflow:auto; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .danger-btn { background: var(--danger); color: white; }
    @media (max-width: 980px) { .form-layout, .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <div class="eyebrow">INTERNAL FORM ADMIN</div>
        <h1>表单维护后台</h1>
        <p>用表单维护赛事数据，不再直接编辑 JSON。当前为 Phase 1.3 内部可用版。</p>
      </div>
      <div class="hero-actions">
        <button id="loadBtn">读取数据</button>
        <button id="jsonBtn" class="ghost">JSON后台</button>
        <button id="frontBtn" class="ghost">返回模型</button>
      </div>
    </header>

    <section class="form-layout">
      <aside class="panel form-side">
        <div>
          <h2>比赛列表</h2>
          <div id="matchList"></div>
        </div>

        <div class="form-card">
          <h2>保存设置</h2>
          <label>后台口令
            <input id="tokenInput" type="password" placeholder="输入内部维护口令" />
          </label>
          <div class="actions">
            <button id="saveBtn">保存当前比赛</button>
            <button id="newBtn" class="ghost">新增比赛</button>
            <button id="copyBtn" class="ghost">复制当前</button>
            <button id="deleteBtn" class="danger-btn">删除当前</button>
          </div>
        </div>

        <div class="form-card">
          <h2>状态</h2>
          <div id="statusBox" class="status">等待读取数据...</div>
        </div>
      </aside>

      <main class="panel">
        <h2>当前比赛</h2>
        <p class="hint">近5场格式：每行一场，例如 W,2,0 表示胜 2:0；D,1,1 表示平 1:1；L,0,2 表示负 0:2。</p>

        <div class="form-grid">
          <section class="form-section full">
            <h2>基础信息</h2>
            <div class="mini-grid">
              <label>比赛ID<input id="id" /></label>
              <label>赛事<input id="competition" /></label>
              <label>阶段<input id="stage" /></label>
            </div>
            <div class="mini-grid">
              <label>开球时间<input id="kickoff" placeholder="2026-07-07T04:31:00+08:00" /></label>
              <label>是否中立场<select id="neutral"><option value="false">否</option><option value="true">是</option></select></label>
              <label>球场<input id="venueName" /></label>
            </div>
            <div class="mini-grid">
              <label>城市<input id="venueCity" /></label>
              <label>海拔m<input id="altitudeM" type="number" /></label>
              <label>旅行说明<input id="note" placeholder="选填" /></label>
            </div>
          </section>

          <section class="form-section">
            <h2>主队</h2>
            <label>球队名称<input id="homeName" /></label>
            <label>排名<input id="homeRank" type="number" /></label>
            <label>上场时间<input id="homeLastPlayedAt" /></label>
            <label>旅行距离km<input id="homeTravelKm" type="number" /></label>
            <label>近5场<textarea id="homeForm"></textarea></label>
            <label>伤停/缺阵<textarea id="homeInjuries" placeholder="每行：球员名,starter,0.08"></textarea></label>
            <label>停赛<textarea id="homeSuspensions" placeholder="每行：球员名,starter,0.07"></textarea></label>
            <div class="mini-grid">
              <label>公开信号分<input id="homeSignalScore" type="number" step="0.01" /></label>
              <label>可信度<input id="homeSignalReliability" type="number" step="0.01" /></label>
              <label>角色备注<input id="homeMemo" /></label>
            </div>
          </section>

          <section class="form-section">
            <h2>客队</h2>
            <label>球队名称<input id="awayName" /></label>
            <label>排名<input id="awayRank" type="number" /></label>
            <label>上场时间<input id="awayLastPlayedAt" /></label>
            <label>旅行距离km<input id="awayTravelKm" type="number" /></label>
            <label>近5场<textarea id="awayForm"></textarea></label>
            <label>伤停/缺阵<textarea id="awayInjuries" placeholder="每行：球员名,starter,0.08"></textarea></label>
            <label>停赛<textarea id="awaySuspensions" placeholder="每行：球员名,starter,0.07"></textarea></label>
            <div class="mini-grid">
              <label>公开信号分<input id="awaySignalScore" type="number" step="0.01" /></label>
              <label>可信度<input id="awaySignalReliability" type="number" step="0.01" /></label>
              <label>角色备注<input id="awayMemo" /></label>
            </div>
          </section>

          <section class="form-section full">
            <h2>天气与战术</h2>
            <div class="mini-grid">
              <label>温度℃<input id="tempC" type="number" step="0.1" /></label>
              <label>湿度%<input id="humidity" type="number" step="1" /></label>
              <label>风速km/h<input id="windKph" type="number" step="0.1" /></label>
            </div>
            <div class="mini-grid">
              <label>降雨mm<input id="rainMm" type="number" step="0.1" /></label>
              <label>节奏<input id="tempo" type="number" step="0.1" /></label>
              <label>压迫<input id="press" type="number" step="0.1" /></label>
            </div>
          </section>
        </div>
      </main>
    </section>
  </div>
  <script type="module" src="./admin-form.js?v=form2"></script>
</body>
</html>
