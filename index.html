<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鲸喜足球 · 今日赛事预测</title>
  <link rel="stylesheet" href="./today.css?v=one-gpt" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <div class="sub">JINGXI FOOTBALL · GPT 单模型</div>
        <h1>今日足球赛事预测</h1>
        <p>按中国体育彩票赛程口径整理，使用一个 GPT 综合模型输出胜平负、总进球、比分和风险参考。</p>
      </div>
      <button id="refreshBtn">刷新数据</button>
    </header>

    <section class="notice">
      <strong id="liveMode">正在同步今日赛事...</strong>
      <span id="lastUpdated">等待更新</span>
    </section>

    <section class="summary-grid">
      <div><b id="matchCount">0</b><span>今日赛事</span></div>
      <div><b id="lowRiskCount">0</b><span>低风险</span></div>
      <div><b id="avgConfidence">0%</b><span>平均信心</span></div>
    </section>

    <section class="filter-bar">
      <button class="tab active" data-risk="all">全部</button>
      <button class="tab" data-risk="low">低风险</button>
      <button class="tab" data-risk="medium">中风险</button>
      <button class="tab" data-risk="high">高风险</button>
      <button class="tab" data-risk="avoid">建议避开</button>
    </section>

    <main id="matchList" class="match-list"></main>

    <section class="footer-note">
      <p>说明：本页面只保留一个 GPT 综合模型，不做多模型对比、不做会员登录、不接收费入口。结果仅作内部分析参考，最终以中国体育彩票官方赛程与临场信息为准。</p>
    </section>
  </div>

  <script type="module" src="./today.js?v=one-gpt"></script>
</body>
</html>
