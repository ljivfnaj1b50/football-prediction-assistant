<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鲸喜足球 · 今日实时预测</title>
  <link rel="stylesheet" href="./today.css?v=v6-split" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <div class="brand">鲸喜足球</div>
        <h1>今日实时赛事预测</h1>
        <p>按中国体育彩票公开赛事优先同步，世界杯和其他赛事分开展示，历史比赛单独归档。</p>
      </div>
      <button id="refreshBtn" class="refresh">刷新实时数据</button>
    </header>

    <section class="live-strip">
      <div>
        <span class="dot"></span>
        <strong id="liveMode">正在连接今日数据源</strong>
      </div>
      <span id="lastUpdated">等待同步</span>
    </section>

    <section class="dashboard">
      <div class="metric"><b id="matchCount">0</b><span>今日可关注</span></div>
      <div class="metric"><b id="bestCount">0</b><span>可关注方案</span></div>
      <div class="metric"><b id="avgConfidence">0%</b><span>平均信心</span></div>
      <div class="metric"><b id="sourceName">实时</b><span>数据口径</span></div>
    </section>

    <section id="topPick" class="top-pick empty-panel">正在生成今日重点推荐...</section>

    <section class="toolbar">
      <div class="tabs">
        <button class="tab active" data-risk="all">全部</button>
        <button class="tab" data-risk="low">重点</button>
        <button class="tab" data-risk="medium">谨慎</button>
        <button class="tab" data-risk="high">高风险</button>
        <button class="tab" data-risk="avoid">避开</button>
      </div>
      <select id="sortBy" aria-label="排序">
        <option value="kickoff">按开赛时间</option>
        <option value="confidence">按信心排序</option>
        <option value="risk">按风险排序</option>
      </select>
    </section>

    <main id="matchList" class="match-list"></main>

    <footer class="disclaimer">
      数据自动刷新，预测结果只作分析参考。临场阵容、伤停、赔率变化会影响最终判断。
    </footer>
  </div>

  <script type="module" src="./today.js?v=v6-split"></script>
</body>
</html>
