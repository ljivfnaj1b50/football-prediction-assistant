<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鲸喜体育赛事预测</title>
  <link rel="stylesheet" href="./today.css?v=v11-lottery" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark">鲸</div>
        <div>
          <h1>鲸喜体育赛事预测</h1>
          <p>公开赛程同步、赛事分组预览、二级详情页分析。</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="avatar-stack" aria-label="分析团队">
          <span>AI</span><span>数据</span><span>风控</span>
        </div>
        <button id="refreshBtn" class="refresh">刷新数据</button>
      </div>
    </header>

    <nav class="product-switch" aria-label="产品菜单">
      <button class="product-tab active" data-product="sports">赛事预测</button>
      <button class="product-tab" data-product="lottery">数字彩预测</button>
    </nav>

    <section class="live-strip sports-view">
      <div>
        <span class="dot"></span>
        <strong id="liveMode">正在连接今日数据源</strong>
      </div>
      <span id="lastUpdated">等待同步</span>
    </section>

    <section class="dashboard sports-view">
      <div class="metric"><b id="matchCount">0</b><span>今日赛事</span></div>
      <div class="metric"><b id="bestCount">0</b><span>可关注方案</span></div>
      <div class="metric"><b id="avgConfidence">0%</b><span>平均信心</span></div>
      <div class="metric"><b id="sourceName">实时</b><span>数据口径</span></div>
    </section>

    <section class="toolbar sports-view">
      <div class="tabs">
        <button class="tab active" data-risk="all">全部</button>
        <button class="tab" data-risk="low">重点</button>
        <button class="tab" data-risk="medium">谨慎</button>
        <button class="tab" data-risk="high">高风险</button>
        <button class="tab" data-risk="avoid">避开</button>
      </div>
      <select id="sortBy" aria-label="排序">
        <option value="kickoff">按开赛时间</option>
        <option value="confidence">按信心排序</option>
        <option value="risk">按风险排序</option>
      </select>
    </section>

    <main id="matchList" class="match-list sports-view"></main>
    <main id="lotteryApp" class="lottery-app" hidden></main>

    <footer class="disclaimer">
      数据自动刷新，预测结果只作分析参考。临场阵容、伤停、赔率变化会影响最终判断。
    </footer>
  </div>

  <script type="module" src="./today.js?v=v11-lottery"></script>
  <script type="module" src="./lottery.js?v=v11-lottery"></script>
</body>
</html>
